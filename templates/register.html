{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-6">
        <div class="card p-4 border-0 shadow">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="bg-success bg-opacity-10 text-success p-3 rounded-circle d-inline-block mb-3">
                        <i class="bi bi-person-plus fs-2"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Create Your Account</h3>
                    <p class="text-muted small">Register a unique system email parameter identity set</p>
                </div>
                <form method="POST" action="{{ url_for('register') }}" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Full Professional Name</label>
                        <input type="text" name="name" class="form-control bg-light" placeholder="John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Email Parameter Address</label>
                        <input type="email" name="email" class="form-control bg-light" placeholder="john@example.com" required>
                    </div>
                    <div class="row mb-4">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label class="form-label small fw-bold text-secondary">Password Signature</label>
                            <input type="password" name="password" class="form-control bg-light" placeholder="••••••••" minlength="6" required>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small fw-bold text-secondary">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control bg-light" placeholder="••••••••" minlength="6" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 mb-3 border-0 shadow-sm" style="background-color: #10B981;">Register Base Persona</button>
                    <div class="text-center small">
                        <span class="text-muted">Already registered?</span> <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
